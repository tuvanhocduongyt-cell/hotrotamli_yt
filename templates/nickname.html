<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Đấu Trường Lịch Sử</title>
    <style>
        body {
            background-color: #14213d;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }
        input, select {
            padding: 10px;
            font-size: 18px;
            border-radius: 6px;
            border: none;
            width: 250px;
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #fca311;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
        }
        h2 {
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <h2>🎓 Đấu Trường Lịch Sử</h2>
    <form action="/start_game" method="POST">
        <input type="text" name="nickname" placeholder="Nhập nickname của bạn" required>
        <br>
        <select name="bai" required>
            <option value="" disabled selected>Chọn bài thi</option>
            <option value="k12_chude_1">📝  K12_Chủ đề 1: Thế giới trong và sau chiến tranh lạnh</option>
            <option value="k12_chude_2">📜  K12_Chủ đề 2: ASEAN: Những chặng đường lịch sử</option>
            <option value="k12_chude_3">📜  K12_Chủ đề 3: Cách mạng tháng Tám năm 1945, chiến tranh giải phóng dân tộc và chiến tranh bảo vệ tổ quốc trong Lịch sử VN từ 8/1945 đến nay</option>
            <option value="k12_chude_4">📜  K12_Chủ đề 4: Công cuộc đổi mới ở Việt Nam từ 1986 đến nay</option>
            <option value="k12_chude_5">📜  K12_Chủ đề 5: Hoạt động đối ngoại của Việt Nam thời cận - hiện đại</option>
            <option value="k12_chude_6">📜  K12_Chủ đề 6: Hồ Chí Minh trong Lịch sử Việt Nam</option>
            <option value="k11_chude_1">📝  K11_Chủ đề 1: Cách mạng tư sản và sự phát triển của chủ nghĩa tư bản</option>
            <option value="k11_chude_2">📜  K11_Chủ đề 2: Chủ nghĩa xã hội từ năm 1917 đến nay</option>
            <option value="k11_chude_3">📜  K11_Chủ đề 3: Quá trình giành độc lập dân tộc của các quốc gia Đông Nam Á</option>
            <option value="k11_chude_4">📜  K11_Chủ đề 4: Chiến tranh bảo vệ tổ quốc và chiến tranh giải phóng dân tộc trong LS VN trước CM tháng 8.1945</option>
            <option value="k11_chude_5">📜  K11_Chủ đề 5: Một số cuộc cải cách lớn trong lịch sử Việt Nam trước năm 1858</option>
            <option value="k11_chude_6">📜  K11_Chủ đề 6: Lịch sử bảo vệ chủ quyền, các quyền và lợi ích hợp pháp của Việt Nam ở biển Đông</option>
            <option value="k10_chude_1">📝  K10_Chủ đề 1: Lịch sử và Sử học</option>
            <option value="k10_chude_2">📜  K10_Chủ đề 2: Vai trò của Sử học</option>
            <option value="k10_chude_3">📜  K10_Chủ đề 3: Một số nền văn minh thế giới thời kì cổ - trung đại</option>
            <option value="k10_chude_4">📜  K10_Chủ đề 4: Cuộc cách mạng công nghiệp trong lịch sử thế giới</option>
            <option value="k10_chude_5">📜  K10_Chủ đề 5: Văn minh Đông Nam Á</option>
            <option value="k10_chude_6">📜  K10_Chủ đề 6: Một số nền văn minh trên đất nước Việt Nam trước năm 1858</option>
            <option value="k10_chude_7">📜  K10_Chủ đề 7: Cộng đồng các dân tộc Việt Nam</option>
        </select>
        <br>
        <button type="submit">Bắt đầu thi đấu</button>
    </form>
</body>
</html>
