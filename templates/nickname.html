<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Đấu Trường Lịch Sử</title>
    <style>
        body {
            background-color: #14213d;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }
        input, select {
            padding: 10px;
            font-size: 18px;
            border-radius: 6px;
            border: none;
            width: 250px;
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #fca311;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
        }
        h2 {
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <h2>🎓 Đấu Trường Lịch Sử</h2>
    <form action="/start_game" method="POST">
        <input type="text" name="nickname" placeholder="Nhập nickname của bạn" required>
        <br>
        <select name="bai" required>
            <option value="" disabled selected>Chọn bài thi</option>
            <option value="chude_1">📝  Chủ đề 1: Thế giới trong và sau chiến tranh lạnh</option>
            <option value="chude_2">📜  Chủ đề 2: ASEAN: Những chặng đường lịch sử</option>
            <option value="chude_3">📜  Chủ đề 3: Cách mạng tháng Tám năm 1945, chiến tranh giải phóng dân tộc và chiến tranh bảo vệ tổ quốc trong Lịch sử VN từ 8/1945 đến nay</option>
            <option value="chude_4">📜  Chủ đề 4: Công cuộc đổi mới ở Việt Nam từ 1986 đến nay</option>
            <option value="chude_5">📜  Chủ đề 5: Hoạt động đối ngoại của Việt Nam thời cận - hiện đại</option>
            <option value="chude_6">📜  Chủ đề 6: Hồ Chí Minh trong Lịch sử Việt Nam</option>
       
            
        </select>
        <br>
        <button type="submit">Bắt đầu thi đấu</button>
    </form>
</body>
</html>
