<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tâm An - Trợ lý AI (Voice + Streaming)</title>
<style>
  :root{
    --bg1:#eef5ff; --accent:#3b82f6; --bot:#e6f2ff; --user:#d7f9e1;
    --card:#ffffff;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:Inter,Segoe UI,Arial,sans-serif;
    background:linear-gradient(180deg,var(--bg1),#f7fbff);
    display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;
  }

  .frame{
    width:100%;max-width:420px;height:85vh;background:var(--card);border-radius:16px;
    box-shadow:0 10px 30px rgba(15,23,42,0.12);display:flex;flex-direction:column;overflow:hidden;
  }
  #feedbackPanel{
    position:sticky;
    bottom:0;
    background:#f7faff;
    border-top:1px solid #ddd;
    padding:12px 16px;
    box-shadow:0 -2px 8px rgba(0,0,0,0.05);
    z-index:10;
  }
  #feedbackPanel h3{margin:0 0 8px 0;font-size:15px;color:#333;}
  #feedbackPanel input,#feedbackPanel select{border:1px solid #ccc;transition:border-color .2s;}
  #feedbackPanel input:focus,#feedbackPanel select:focus{border-color:var(--accent);outline:none;}

  header{
    padding:16px;background:linear-gradient(90deg,var(--accent),#2563eb);color:#fff;
    display:flex;gap:12px;align-items:center;position:relative;
  }
  header img{width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,0.15)}
  header .info{flex:1}
  header h1{font-size:16px;margin:0}
  header p{margin:0;font-size:12px;opacity:0.9}
  
  .back-btn{
    position:absolute;right:16px;top:50%;transform:translateY(-50%);
    background:rgba(255,255,255,0.2);border:none;color:white;
    padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;
    transition:all 0.3s;text-decoration:none;
  }
  .back-btn:hover{background:rgba(255,255,255,0.3)}

  #msgs{
    flex:1;padding:16px 16px 120px;overflow:auto;display:flex;flex-direction:column;gap:12px;
    background:linear-gradient(180deg, rgba(59,130,246,0.03), transparent 30%);
  }
  .bubble{max-width:78%;padding:10px 14px;border-radius:12px;box-shadow:0 2px 6px rgba(2,6,23,0.04);font-size:14px;line-height:1.4}
  .row{display:flex;gap:10px;align-items:flex-end;animation:slideIn 0.3s ease}
  
  @keyframes slideIn {
    from { opacity:0; transform:translateY(10px) }
    to { opacity:1; transform:translateY(0) }
  }
  
  .row.bot{justify-content:flex-start}
  .row.user{justify-content:flex-end}
  .bubble.bot{background:var(--bot);border-bottom-left-radius:4px}
  .bubble.user{background:var(--user);border-bottom-right-radius:4px}

  .avatar{width:36px;height:36px;border-radius:50%;object-fit:cover}

  .typing-indicator {
    display: inline-flex;
    gap: 4px;
    padding: 8px 12px;
    background: var(--bot);
    border-radius: 12px;
    border-bottom-left-radius: 4px;
  }
  .typing-indicator span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: typing 1.4s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  
  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-8px); opacity: 1; }
  }

  footer{
    padding:12px;background:#fbfdff;display:flex;gap:10px;align-items:center;
    border-top:1px solid #eef2ff;
  }
  .mic{
    width:64px;height:64px;border-radius:50%;
    background:linear-gradient(180deg,#ff5966,#ff3b5c);
    border:none;color:white;font-size:22px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;box-shadow:0 6px 18px rgba(255,59,92,0.25);
    transition:transform .12s,box-shadow .12s;flex-shrink:0;
  }
  .mic.recording{
    background:linear-gradient(180deg,#00c853,#00b04a);
    box-shadow:0 12px 30px rgba(0,200,83,0.3);
    transform:scale(1.05);
    animation:pulse 1.5s infinite;
  }
  
  @keyframes pulse {
    0%, 100% { box-shadow:0 12px 30px rgba(0,200,83,0.3) }
    50% { box-shadow:0 12px 40px rgba(0,200,83,0.5) }
  }
  
  .controls{flex:1;display:flex;flex-direction:column;gap:8px}
  .input-row{display:flex;gap:8px}
  .txt{
    flex:1;padding:10px;border-radius:10px;border:1px solid #e6eefc;
    background:#fff;font-size:14px;font-family:inherit;
  }
  .txt:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
  
  #sendBtn{
    padding:10px 20px;background:var(--accent);color:white;
    border:none;border-radius:10px;cursor:pointer;font-weight:600;
    transition:all 0.3s;
  }
  #sendBtn:hover:not(:disabled){background:#2563eb;transform:translateY(-1px)}
  #sendBtn:disabled{background:#cbd5e1;cursor:not-allowed}
  
  .status{font-size:12px;color:#64748b;display:flex;align-items:center;gap:6px}
  .status.streaming{color:#00c853}
  .status-dot{
    width:6px;height:6px;border-radius:50%;background:currentColor;
    animation:blink 1.5s infinite;
  }
  
  @keyframes blink {
    0%, 100% { opacity:1 }
    50% { opacity:0.3 }
  }
  
  audio{width:100%;margin-top:8px;border-radius:8px;height:32px}
  
  .play-btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:6px 12px;margin-top:8px;
    background:var(--accent);color:white;border:none;
    border-radius:6px;cursor:pointer;font-size:12px;
  }
  .play-btn:hover{background:#2563eb}

  @media (max-width: 480px) {
    .frame{height:100vh;border-radius:0}
    body{padding:0}
  }
</style>
</head>
<body>
  <div class="frame">
    <header>
      <img src="/static/images/chat_voice.jpg" alt="bot">
      <div class="info">
        <h1>🎙️ Tâm An</h1>
        <p>Trợ lý AI với giọng Việt + Streaming</p>
      </div>
      <a href="/" class="back-btn">← Menu</a>
    </header>

    <div id="msgs"></div>

    <footer>
      <button id="mic" class="mic">🎙️</button>
      <div class="controls">
        <div class="input-row">
          <input id="textInput" class="txt" placeholder="Gõ hoặc bấm mic để nói..." />
          <button id="sendBtn">Gửi</button>
        </div>
        <div class="status" id="status">
          <span class="status-dot" style="display:none"></span>
          <span id="statusText">Sẵn sàng</span>
        </div>
      </div>
      <!-- feedback panel -->
      <div id="feedbackPanel" style="width:100%; padding:12px 16px; border-top:1px solid #ddd; background:#fafafa;">
        <h3 style="margin:0 0 8px;font-size:15px;color:#333;">Đánh giá trợ lý AI</h3>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <select id="fbRating2" style="flex:1 1 160px; padding:8px; border:1px solid #ccc; border-radius:6px;">
            <option value="">Mức độ hài lòng</option>
            <option value="Rất hài lòng">Rất hài lòng</option>
            <option value="Hài lòng">Hài lòng</option>
            <option value="Bình thường">Bình thường</option>
            <option value="Không hài lòng">Không hài lòng</option>
            <option value="Rất không hài lòng">Rất không hài lòng</option>
          </select>
          <button onclick="sendFeedback2()" style="padding:8px 16px; background:#3b82f6; color:white; border:none; border-radius:6px;">Gửi</button>
        </div>
        <div id="fbMsg2" style="margin-top:8px; color:green;font-size:13px;"></div>
      </div>
    </footer>
  </div>

<script>
const msgs = document.getElementById('msgs');
const mic = document.getElementById('mic');
const txt = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');
const status = document.getElementById('status');
const statusText = document.getElementById('statusText');
const statusDot = status.querySelector('.status-dot');

let isProcessing = false;
let currentAudio = null;

function addMessage(text, who, audioUrl=null) {
  const row = document.createElement('div');
  row.className = 'row ' + who;
  
  const avatar = document.createElement('img');
  avatar.className = 'avatar';
  avatar.src = who === 'bot' ? '/static/images/chat_voice.jpg' : '/static/images/user.png';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + who;
  bubble.textContent = text;

  if (who === 'bot') {
    row.appendChild(avatar);
    row.appendChild(bubble);
  } else {
    row.appendChild(bubble);
    row.appendChild(avatar);
  }
  
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;

  if (audioUrl) {
    // Tạo nút play thay vì autoplay (tránh bị chặn trên mobile)
    const playBtn = document.createElement('button');
    playBtn.className = 'play-btn';
    playBtn.innerHTML = '🔊 Nghe giọng đọc';
    playBtn.onclick = () => {
      // Dừng audio cũ nếu có
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }
      
      const audio = new Audio(audioUrl);
      currentAudio = audio;
      audio.play().catch(err => {
        console.warn('Không thể play audio:', err);
        alert('Không thể phát audio. Vui lòng kiểm tra kết nối.');
      });
      
      playBtn.textContent = '⏸️ Đang phát...';
      audio.onended = () => {
        playBtn.innerHTML = '🔊 Nghe lại';
        currentAudio = null;
      };
    };
    bubble.appendChild(playBtn);
  }
  
  return bubble;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'row bot';
  row.id = 'typingRow';
  
  const avatar = document.createElement('img');
  avatar.className = 'avatar';
  avatar.src = '/static/images/chat_voice.jpg';
  
  const typing = document.createElement('div');
  typing.className = 'typing-indicator';
  typing.innerHTML = '<span></span><span></span><span></span>';
  
  row.appendChild(avatar);
  row.appendChild(typing);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const typingRow = document.getElementById('typingRow');
  if (typingRow) typingRow.remove();
}

function updateStatus(text, isStreaming = false) {
  statusText.textContent = text;
  if (isStreaming) {
    status.classList.add('streaming');
    statusDot.style.display = 'block';
  } else {
    status.classList.remove('streaming');
    statusDot.style.display = 'none';
  }
}

// GỬI MESSAGE VỚI STREAMING
async function sendToServer(message) {
  if (isProcessing) return;
  
  addMessage(message, 'user');
  showTyping();
  isProcessing = true;
  sendBtn.disabled = true;
  updateStatus('Đang xử lý...', true);
  
  try {
    const res = await fetch('/chat_tam_an', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message})
    });
    
    removeTyping();
    
    if (!res.ok) {
      throw new Error('Network error: ' + res.status);
    }
    
    const data = await res.json();
    console.log('Response data:', data); // Debug
    
    const reply = data.reply || 'Xin lỗi, tôi không trả lời được.';
    
    // Tạo bubble bot với streaming effect
    const row = document.createElement('div');
    row.className = 'row bot';
    
    const avatar = document.createElement('img');
    avatar.className = 'avatar';
    avatar.src = '/static/images/chat_voice.jpg';
    
    const bubble = document.createElement('div');
    bubble.className = 'bubble bot';
    
    row.appendChild(avatar);
    row.appendChild(bubble);
    msgs.appendChild(row);
    
    // Hiển thị text từng chữ (streaming effect)
    let currentText = '';
    const words = reply.split(' ');
    
    for (let i = 0; i < words.length; i++) {
      currentText += (i > 0 ? ' ' : '') + words[i];
      bubble.textContent = currentText;
      msgs.scrollTop = msgs.scrollHeight;
      await new Promise(resolve => setTimeout(resolve, 30));
    }
    
    // Thêm nút play audio nếu có
    if (data.audio_url) {
      console.log('Audio URL:', data.audio_url); // Debug
      
      const playBtn = document.createElement('button');
      playBtn.className = 'play-btn';
      playBtn.innerHTML = '🔊 Nghe giọng đọc';
      playBtn.onclick = () => {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }
        
        const audio = new Audio(data.audio_url);
        currentAudio = audio;
        audio.play().catch(err => {
          console.error('Play audio error:', err);
          alert('Không thể phát audio. Vui lòng thử lại.');
        });
        
        playBtn.textContent = '⏸️ Đang phát...';
        audio.onended = () => {
          playBtn.innerHTML = '🔊 Nghe lại';
          currentAudio = null;
        };
      };
      bubble.appendChild(playBtn);
    } else {
      console.warn('Không có audio_url trong response');
    }
    
    updateStatus('Sẵn sàng', false);
    
  } catch (e) {
    removeTyping();
    addMessage('❌ Lỗi kết nối. Vui lòng thử lại!', 'bot');
    console.error('Send error:', e);
    updateStatus('Lỗi', false);
  } finally {
    isProcessing = false;
    sendBtn.disabled = false;
  }
}

// Xử lý gửi text
sendBtn.addEventListener('click', () => {
  const v = txt.value.trim();
  if (v && !isProcessing) {
    sendToServer(v);
    txt.value = '';
  }
});

txt.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const v = txt.value.trim();
    if (v && !isProcessing) {
      sendToServer(v);
      txt.value = '';
    }
  }
});

// SPEECH RECOGNITION
let recognition = null;
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'vi-VN';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    mic.classList.add('recording');
    updateStatus('Đang nghe...', true);
  };
  
  recognition.onend = () => {
    mic.classList.remove('recording');
    updateStatus('Sẵn sàng', false);
  };
  
  recognition.onerror = (e) => {
    console.error('Speech recognition error:', e);
    mic.classList.remove('recording');
    updateStatus('Lỗi nhận diện', false);
  };

  recognition.onresult = (evt) => {
    const text = evt.results[0][0].transcript;
    txt.value = text;
    sendToServer(text);
  };

  mic.addEventListener('click', () => {
    if (isProcessing) return;
    
    try {
      if (mic.classList.contains('recording')) {
        recognition.stop();
      } else {
        recognition.start();
      }
    } catch(e) {
      console.error('Mic error:', e);
    }
  });

} else {
  mic.addEventListener('click', () => {
    alert('Trình duyệt của bạn không hỗ trợ nhận diện giọng nói. Dùng Chrome hoặc Edge phiên bản mới nhé.');
  });
}

// Welcome message
window.addEventListener('load', () => {
  addMessage('👋 Xin chào! Tôi là Tâm An. Bạn muốn hỏi gì hôm nay?', 'bot');
  txt.focus();
});

// feedback handler for Tâm An (rating only)
async function sendFeedback2() {
  const rating = document.getElementById('fbRating2').value;
  const msg = document.getElementById('fbMsg2');
  if (!rating) {
    msg.style.color = 'red';
    msg.textContent = 'Vui lòng chọn đánh giá';
    return;
  }
  try {
    const res = await fetch('/chat_feedback', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({rating, bot: 'tam_an'})
    });
    const data = await res.json();
    if (data.status === 'ok') {
      msg.style.color = 'green';
      msg.textContent = 'Cảm ơn bạn đã đánh giá!';
      document.getElementById('fbRating2').value = '';
    } else {
      msg.style.color = 'red';
      msg.textContent = 'Gửi không thành công';
    }
  } catch (e) {
    msg.style.color = 'red';
    msg.textContent = 'Lỗi mạng';
  }
}
</script>
</body>
</html>
